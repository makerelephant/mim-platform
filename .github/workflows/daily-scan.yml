name: Daily Inbox Scan

on:
  schedule:
    # 6:00 AM EST (11:00 UTC) every day
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Which scanner(s) to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gmail
          - stale
          - outreach

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/agents/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/agents/requirements.txt

      - name: Set up Gmail credentials
        run: |
          echo "${{ secrets.GOOGLE_TOKEN }}" | base64 -d > scripts/agents/token.json
        if: inputs.scan_type == 'all' || inputs.scan_type == 'gmail' || github.event_name == 'schedule'

      - name: Run agents
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SCAN_TYPE="${{ inputs.scan_type || 'all' }}"
          if [ "$SCAN_TYPE" = "all" ]; then
            python scripts/agents/run-all.py --all
          elif [ "$SCAN_TYPE" = "gmail" ]; then
            python scripts/agents/run-all.py --gmail
          elif [ "$SCAN_TYPE" = "stale" ]; then
            python scripts/agents/run-all.py --stale
          elif [ "$SCAN_TYPE" = "outreach" ]; then
            python scripts/agents/run-all.py --outreach
          fi
