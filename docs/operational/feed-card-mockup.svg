<svg width="1400" height="1180" viewBox="0 0 1400 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDF4F8"/>
